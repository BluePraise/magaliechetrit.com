[build]
  command = "npm run build"
  publish = "_site"

# Redirect old /lite/* URLs to their new canonical locations
[[redirects]]
  from = "/lite/"
  to = "/"
  status = 301

[[redirects]]
  from = "/lite/blog/"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/lite/now/"
  to = "/now/"
  status = 301

[[redirects]]
  from = "/lite/*"
  to = "/"
  status = 301

# Cache static assets for 1 year (content-hashed or versioned files)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts for 1 year
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: no caching (always re-validate)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
